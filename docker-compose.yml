# --- START OF docker-compose.yml (create this file: TinyScale/docker-compose.yml) ---
services:
  # ---- YOUR APP ----
  app:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "3000"
    environment:
      DATABASE_URL: postgres://dev:dev@db:5432/tinyscale
      JWT_SECRET: docker-dev-secret-change-in-production
      REDIS_URL: redis://redis:6379
      PORT: 3000
      HOST: 0.0.0.0
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - tinyscale-network
    restart: unless-stopped
    # restart: unless-stopped means if the container crashes, Docker restarts it
    # unless YOU manually stopped it with docker-compose stop.
  
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - app
    networks:
      - tinyscale-network
    restart: unless-stopped
    
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    command: ["npx", "drizzle-kit", "push", "--config=drizzle.config.ts"]
    environment:
      DATABASE_URL: postgres://dev:dev@db:5432/tinyscale
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tinyscale-network
        
  # ---- POSTGRESQL ----
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: tinyscale
    ports:
      - "5433:5432"
      # Map to 5433 on host so it doesn't conflict with your local Postgres on 5432
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Named volume = data persists even if container is destroyed
      # /var/lib/postgresql/data is where Postgres stores its files INSIDE the container
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d tinyscale"]
      interval: 5s
      timeout: 5s
      retries: 5
      # healthcheck = Docker checks if Postgres is actually ready, not just running
      # pg_isready is a Postgres utility that checks if the server accepts connections
      # Without this, your app might start before Postgres is ready → crash
    networks:
      - tinyscale-network

  # Redis Cache 
  redis:
    image: redis:7-alpine
    # Redis 7 on Alpine Linux — small and fast
    ports:
      - "6379:6379"
      # 6379 is Redis's default port
      # Mapping to host so you can use redis-cli from your machine
    volumes:
      - redisdata:/data
      # Redis can persist data to disk (RDB snapshots / AOF log)
      # /data is where Redis saves its dump.rdb file
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      # redis-cli ping should return PONG if Redis is healthy
    networks:
      - tinyscale-network
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru

  # ---- PROMETHEUS (metrics collection) ----
  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    depends_on:
      - app
    networks:
      - tinyscale-network
    restart: unless-stopped

  # ---- GRAFANA (visualization) ----
  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3001:3000"
    volumes:
      - grafanadata:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus
    networks:
      - tinyscale-network
    restart: unless-stopped

# ---- VOLUMES ----
volumes:
  pgdata:
  redisdata:
  prometheusdata:
  grafanadata:
    # This creates a Docker-managed volume on your machine.
    # Even if you `docker-compose down`, data stays.
    # To DELETE data: docker-compose down -v (the -v flag removes volumes)

# ---- NETWORKS ----
networks:
  tinyscale-network:
    driver: bridge
    # bridge network = containers can talk to each other by service NAME
    # Your app connects to "db:5432" — Docker resolves "db" to the container's IP
    # This is Docker's built-in DNS. No IP addresses needed.
# --- END OF docker-compose.yml ---
