# Global settings
global:
  scrape_interval: 15s
  evaluation_interval: 15s

# What to scrape
scrape_configs:
  # Prometheus scrapes itself (it exposes its own metrics)
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Your TinyScale app
  - job_name: "tinyscale"
    static_configs:
      - targets: ["app:3000"]
    metrics_path: "/metrics"
